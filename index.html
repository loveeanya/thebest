<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Для моей девочки 💖</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}
body{
    overflow:hidden;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg, #ff9ecf, #ff6fae, #ffb6d9, #ff85b8);
    position:relative;
}
/* АНИМАЦИЯ ФОНА */
body::before{
    content:"";
    position:absolute;
    width:200%;
    height:200%;
    background: radial-gradient(rgba(255,255,255,0.15), transparent 60%);
    animation:bgMove 12s linear infinite;
}
@keyframes bgMove{
    0%{ transform:translate(-10%,-10%) rotate(0deg); }
    100%{ transform:translate(-20%,-20%) rotate(360deg); }
}
/* ОБЩИЙ КОНТЕЙНЕР ДЛЯ ЦЕНТРИРОВАНИЯ И СБОРОК */
.main-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    max-width: 420px;
    z-index: 5;
    gap: 15px;
}
/* КАРТОЧКА */
.card{
    position:relative;
    width:90%;
    padding:25px 20px;
    border-radius:35px;
    text-align:center;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(15px);
    -webkit-backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,0.25);
    box-shadow: 0 0 40px rgba(255,0,120,0.3);
}
/* ЗАГОЛОВОК */
.title{
    font-size:28px;
    color:white;
    margin-bottom:15px;
    text-shadow: 0 0 10px rgba(255,255,255,0.7);
}
/* ПРЯМОУГОЛЬНИК С ФОТОГРАФИЯМИ */
.photo-slider{
    position: relative;
    width: 200px; 
    height: 270px; 
    margin: 0 auto 15px auto;
    border-radius: 25px; 
    overflow: hidden;
    border: 4px solid white;
    box-shadow: 0 0 25px rgba(255, 20, 147, 0.6);
}
.photo-slider img{
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0;
    transition: opacity 1s ease-in-out;
}
.photo-slider img.active{
    opacity: 1;
}
/* СЛОВА ПЕСНИ (СУБТИТРЫ) */
.subtitle{
    font-size:17px;
    color:#fff0f7;
    line-height:1.4;
    margin-bottom:10px;
    min-height: 50px;
    display: flex;
    align-items: center;
    justify-content: center;
}
/* НАДПИСЬ ПОСЛЕ КЛИКА */
#loveText{
    font-size:20px;
    color:white;
    opacity:0;
    transition:1.5s ease-in-out; /* Плавное проявление */
    text-shadow: 0 0 5px rgba(255,255,255,0.5);
}
.show{ opacity:1 !important; }

/* КНОПКА ПОЦЕЛУЯ */
.kiss{
    font-size:75px;
    cursor:pointer;
    animation:pulse 2s infinite;
    user-select: none;
    line-height: 1;
}
@keyframes pulse{
    0%{ transform: scale(1); }
    50%{ transform: scale(1.15); }
    100%{ transform: scale(1); }
}
/* СЕРДЦА */
.heart{
    position:absolute;
    color:rgba(255,255,255,0.5);
    animation:fall linear infinite;
    user-select:none;
}
@keyframes fall{
    0%{ transform: translateY(-10vh) rotate(0deg); opacity:0; }
    10% { opacity:1; }
    100%{ transform: translateY(110vh) rotate(360deg); opacity:0; }
}

/* ОПТИМИЗАЦИЯ ДЛЯ СОВСЕМ МАЛЕНЬКИХ ТЕЛЕФОНОВ */
@media(max-height: 650px){
    .title{ font-size:24px; }
    .photo-slider { width: 160px; height: 215px; }
    .subtitle{ font-size:15px; }
    .kiss{ font-size:60px; }
}
</style>
</head>
<body>

<!-- МУЗЫКА -->
<audio id="music" preload="auto" playsinline webkit-playsinline>
    <source src="./romans.mp3" type="audio/mpeg">
</audio>

<!-- ОБЩИЙ КОНТЕЙНЕР -->
<div class="main-container">

    <!-- КАРТОЧКА -->
    <div class="card">
        <div class="title">Любимой 💖</div>
        
        <div class="photo-slider">
            <img src="./img1.jpg" class="active" alt="Фото 1">
            <img src="./img2.jpg" alt="Фото 2">
            <img src="./img3.jpg" alt="Фото 3">
            <img src="./img4.jpg" alt="Фото 4">
            <img src="./img5.jpg" alt="Фото 5">
            <img src="./img6.jpg" alt="Фото 6">
            <img src="./img7.jpg" alt="Фото 7">
            <img src="./img8.jpg" alt="Фото 8">
        </div>

        <div class="subtitle" id="lyricsText">
            Нажми на 💋 внизу экрана... ✨
        </div>
        
        <!-- Изначально скрытый финальный текст -->
        <div id="loveText">
            Я тебя люблю очень сильно 😘❤️
        </div>
    </div>

    <!-- ПОЦЕЛУЙ -->
    <div class="kiss" onclick="startLove()">💋</div>

</div>

<script>
const music = document.getElementById("music");
const loveText = document.getElementById("loveText");
const lyricsText = document.getElementById("lyricsText");

/* ЗАПУСК МУЗЫКИ */
async function startLove(){
    try{
        music.currentTime = 0;
        await music.play();
    }catch(err){
        console.log(err);
    }
}

/* СИНХРОНИЗАЦИЯ СЛОВ ПЕСНИ И АВТО-ПРОЯВЛЕНИЯ ТЕКСТА */
const lyrics = [
    { time: 0.0, text: "В свете фонаря блестит асфальт… " },
    { time: 3.0, text: "Я люблю тебя — ты просто знай… 💖" },
    { time: 7.15, text: "Сдаётся мне, теперь это надолго… " },
    { time: 10.3, text: "Гори… Гори, не догорай… " },
    { time: 12.15, text: "Без тебя жизни нет — я не могу найти… " },
    { time: 15.3, text: "Сколько не жмись к стене, сквозь неё не пройти… " },
    { time: 18.5, text: "Ни одного пути грешной души в зиме… " },
    { time: 21.8, text: "Без тебя смысла нет; без тебя жизни нет… ❤️" },
    { time: 24.0, text: "Я тебя люблю очень сильно, моя девочка 😘❤️" }
];

music.addEventListener("timeupdate", () => {
    const curTime = music.currentTime;
    let activeText = "Нажми на 💋 внизу экрана... ✨";
    
    for (let i = 0; i < lyrics.length; i++) {
        if (curTime >= lyrics[i].time) {
            activeText = lyrics[i].text;
        }
    }
    
    if (lyricsText.innerHTML !== activeText) {
        lyricsText.innerHTML = activeText;
    }

    /* ИЗМЕНЕНО: Появление нижней надписи строго на 24-й секунде */
    if (curTime >= 24.0) {
        loveText.classList.add("show");
    } else {
        loveText.classList.remove("show"); // Скрывает обратно, если трек перезапустили
    }
});

/* СКРИПТ СЛАЙДЕРА ФОТО */
const images = document.querySelectorAll('.photo-slider img');
let currentImgIndex = 0;

setInterval(() => {
    images[currentImgIndex].classList.remove('active');
    currentImgIndex = (currentImgIndex + 1) % images.length;
    images[currentImgIndex].classList.add('active');
}, 3000);

/* ПАДАЮЩИЕ СЕРДЕЧКИ */
for(let i = 0; i < 45; i++){
    let heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤";
    heart.style.left = Math.random()*100 + "vw";
    heart.style.fontSize = (15 + Math.random()*35) + "px";
    heart.style.animationDuration = (4 + Math.random()*6) + "s";
    heart.style.animationDelay = Math.random()*5 + "s";
    document.body.appendChild(heart);
}
</script>
</body>
</html>
